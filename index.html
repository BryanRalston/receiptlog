<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ReceiptLog</title>

  <!-- PWA Meta -->
  <meta name="theme-color" content="#2563EB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ReceiptLog">
  <meta name="description" content="Contractor receipt tracking made simple">
  <link rel="manifest" href="manifest.json">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</head>
<body>

<div id="app">

  <!-- Top Header Bar -->
  <header class="header-bar" id="header-bar">
    <h1 class="header-title">ReceiptLog</h1>
    <button id="btn-export" class="btn-icon" title="Export CSV" aria-label="Export">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </button>
  </header>

  <!-- DASHBOARD VIEW -->
  <section id="view-dashboard" class="view active">
    <div class="stats-grid">
      <div class="stat-card" id="stat-total-spend">
        <span class="stat-label">Total Spend</span>
        <span class="stat-value" id="dashboard-total">$0.00</span>
      </div>
      <div class="stat-card" id="stat-job-count">
        <span class="stat-label">Active Jobs</span>
        <span class="stat-value" id="dashboard-job-count">0</span>
      </div>
      <div class="stat-card" id="stat-pending-count">
        <span class="stat-label">Pending</span>
        <span class="stat-value" id="dashboard-pending-count">0</span>
      </div>
      <div class="stat-card" id="stat-gas-total">
        <span class="stat-label">Gas Total</span>
        <span class="stat-value" id="dashboard-gas-total">$0.00</span>
      </div>
    </div>
    <div class="section-header">
      <h2>Recent Receipts</h2>
      <div class="filter-toggle" id="dashboard-filter">
        <button data-filter="pending" class="active">Pending</button>
        <button data-filter="all">All</button>
      </div>
    </div>
    <div id="dashboard-recent" class="receipt-list">
      <!-- JS populates -->
    </div>
    <div id="dashboard-empty" class="empty-state" style="display:none;">
      <div class="empty-icon">📋</div>
      <p>No receipts yet. Tap + to add your first one.</p>
    </div>
  </section>

  <!-- JOBS VIEW -->
  <section id="view-jobs" class="view">
    <div class="section-header">
      <h2>Jobs</h2>
      <button id="btn-add-job" class="btn-primary btn-sm">+ New Job</button>
    </div>
    <div id="jobs-list" class="jobs-list">
      <!-- JS populates with .job-card elements -->
    </div>
    <div id="jobs-empty" class="empty-state" style="display:none;">
      <div class="empty-icon">🏗️</div>
      <p>No jobs yet. Create one to start tracking receipts.</p>
    </div>
  </section>

  <!-- JOB DETAIL VIEW -->
  <section id="view-job-detail" class="view">
    <button id="btn-back-jobs" class="btn-back">← Back to Jobs</button>
    <div id="job-detail-header" class="job-detail-header">
      <!-- JS populates: job name, client, status, total -->
    </div>
    <div id="job-detail-receipts" class="receipt-groups">
      <!-- JS populates: grouped by store -->
    </div>
  </section>

  <!-- GAS LOG VIEW -->
  <section id="view-gas" class="view">
    <div class="section-header">
      <h2>Gas Log</h2>
      <div class="gas-summary">
        <span class="stat-label">Total</span>
        <span class="stat-value" id="gas-total">$0.00</span>
      </div>
    </div>
    <div id="gas-list" class="receipt-list">
      <!-- JS populates -->
    </div>
    <div id="gas-empty" class="empty-state" style="display:none;">
      <div class="empty-icon">⛽</div>
      <p>No gas receipts yet.</p>
    </div>
  </section>

  <!-- ADD RECEIPT VIEW -->
  <section id="view-add" class="view">
    <div class="section-header">
      <h2 id="add-view-title">Add Receipt</h2>
    </div>
    <form id="receipt-form" class="form" autocomplete="off">
      <input id="receipt-edit-id" type="hidden">
      <div class="form-group">
        <label for="field-job">Job *</label>
        <select id="field-job" class="form-select" required>
          <option value="">Select a job...</option>
        </select>
      </div>
      <div class="form-group">
        <label for="field-store">Store *</label>
        <input id="field-store" class="form-input" type="text" required placeholder="Home Depot, Lowes..." list="store-suggestions">
        <datalist id="store-suggestions"></datalist>
      </div>
      <div class="form-group">
        <label for="field-amount">Amount *</label>
        <input id="field-amount" class="form-input" type="number" step="0.01" min="0" required placeholder="0.00" inputmode="decimal">
      </div>
      <div class="form-group">
        <label for="field-date">Date *</label>
        <input id="field-date" class="form-input" type="date" required>
      </div>
      <div class="form-group">
        <label for="field-category">Category</label>
        <select id="field-category" class="form-select">
          <option value="Materials">Materials</option>
          <option value="Tools">Tools</option>
          <option value="Gas">Gas</option>
          <option value="Permits">Permits</option>
          <option value="Meals">Meals</option>
          <option value="Rental">Rental</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-row">
        <label class="toggle-label">
          <input id="field-gas" type="checkbox" class="toggle-input">
          <span class="toggle-switch"></span>
          <span>Gas Purchase</span>
        </label>
      </div>
      <div class="form-group">
        <label for="field-notes">Notes</label>
        <textarea id="field-notes" class="form-input form-textarea" rows="2" placeholder="Optional notes..."></textarea>
      </div>
      <div class="form-group">
        <label>Photo</label>
        <div class="photo-capture">
          <button type="button" id="camera-btn" class="btn-secondary">📷 Capture Receipt</button>
          <input type="file" id="field-photo" accept="image/*" capture="environment" style="display:none;">
          <div id="photo-preview" class="photo-preview" style="display:none;">
            <img id="photo-preview-img" src="" alt="Receipt photo">
            <button type="button" id="photo-remove" class="btn-remove-photo">✕</button>
          </div>
        </div>
      </div>
      <button type="submit" class="btn-primary btn-block">Save Receipt</button>
    </form>
  </section>

  <!-- EDIT/CREATE JOB MODAL -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">New Job</h3>
        <button id="modal-close" class="btn-close">✕</button>
      </div>
      <form id="job-form" class="form">
        <div class="form-group">
          <label for="job-name">Job Name *</label>
          <input id="job-name" class="form-input" type="text" required placeholder="Kitchen Remodel...">
        </div>
        <div class="form-group">
          <label for="job-client">Client</label>
          <input id="job-client" class="form-input" type="text" placeholder="Client name...">
        </div>
        <div class="form-group">
          <label for="job-address">Address</label>
          <input id="job-address" class="form-input" type="text" placeholder="Job site address...">
        </div>
        <div class="form-group">
          <label for="job-status">Status</label>
          <select id="job-status" class="form-select">
            <option value="active">Active</option>
            <option value="complete">Complete</option>
          </select>
        </div>
        <button type="submit" class="btn-primary btn-block">Save Job</button>
      </form>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="nav-bar">
    <button class="nav-btn active" id="nav-dashboard" data-view="dashboard">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/>
      </svg>
      <span>Home</span>
    </button>
    <button class="nav-btn" id="nav-jobs" data-view="jobs">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
        <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
      </svg>
      <span>Jobs</span>
    </button>
    <button class="nav-btn" id="nav-gas" data-view="gas">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 22V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v17"/>
        <path d="M15 10h2a2 2 0 0 1 2 2v3a1 1 0 0 0 1 1h0a1 1 0 0 0 1-1V8l-3-3"/>
        <rect x="6" y="7" width="5" height="4"/>
      </svg>
      <span>Gas</span>
    </button>
    <button class="nav-btn" id="nav-add" data-view="add">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      <span>Add</span>
    </button>
  </nav>

</div>

<script src="app.js" defer></script>
</body>
</html>
